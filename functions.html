<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="taskflow-db.js"></script>
  <script>
  // ══════════════════════════════════════════════════════
  // TASKFLOW FUNCTIONS FILE
  // Handles ribbon button commands that run without UI
  // ══════════════════════════════════════════════════════

  Office.onReady(() => {
    // Pre-open IndexedDB so quickAddTask is fast
    TaskFlowDB.init().catch(() => {});
  });

  // ── quickAddTask ───────────────────────────────────────
  // Called when user clicks "＋ Añadir tarea" in the ribbon.
  // Reads the current email, saves a task to IndexedDB,
  // then shows a notification in the reading pane.
  async function quickAddTask(event) {
    try {
      await TaskFlowDB.init();
      const item = Office.context.mailbox.item;

      // Check duplicate
      const exists = await TaskFlowDB.taskExistsForEmail(item.itemId);
      if (exists) {
        showNotification('ℹ️ Ya existe', 'Este email ya tiene una tarea en TaskFlow.');
        event.completed();
        return;
      }

      // Build task object from current email
      const task = {
        id: 'task_' + Date.now(),
        name: item.subject || '(Sin asunto)',
        desc: '',
        emailId: item.itemId,
        emailSubject: item.subject,
        emailFrom: item.from ? item.from.emailAddress : '',
        resp: 'followup',
        priority: 3,
        status: 'pending',
        project: '',
        category: 'Email',
        due: '',
        assignee: '',
        followupDays: 7,
        vendor: '',
        created: Date.now(),
        lastActivity: new Date().toISOString(),
        source: 'outlook-addin-quick'
      };

      await TaskFlowDB.putTask(task);
      showNotification('✅ Tarea añadida', `"${task.name.slice(0, 50)}" guardada en TaskFlow.`);
    } catch(e) {
      showNotification('❌ Error', 'No se pudo guardar la tarea: ' + e.message, true);
    }

    event.completed();
  }

  function showNotification(title, message, isError) {
    Office.context.mailbox.item.notificationMessages.replaceAsync('taskflow', {
      type: isError
        ? Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage
        : Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
      message: `${title}: ${message}`,
      icon: 'Icon.16',
      persistent: !!isError
    });
  }
  </script>
</head>
<body></body>
</html>
