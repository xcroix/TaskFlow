<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script>
  // ══════════════════════════════════════════════════════
  // TASKFLOW FUNCTIONS FILE
  // Handles ribbon button commands that run without UI
  // ══════════════════════════════════════════════════════

  Office.onReady(() => {});

  // ── quickAddTask ───────────────────────────────────────
  // Called when user clicks "＋ Añadir tarea" in the ribbon.
  // Reads the current email and saves a task to localStorage
  // then shows a notification in the reading pane.
  function quickAddTask(event) {
    const item = Office.context.mailbox.item;

    // Build task object from current email
    const task = {
      id: 'task_' + Date.now(),
      name: item.subject || '(Sin asunto)',
      desc: '',
      emailId: item.itemId,
      emailSubject: item.subject,
      emailFrom: item.from ? item.from.emailAddress : '',
      resp: 'followup',       // Pinned = followup by default
      priority: 3,
      status: 'pending',
      project: '',
      category: 'Email',
      due: '',
      assignee: '',
      followupDays: 7,
      vendor: '',
      created: Date.now(),
      lastActivity: new Date().toISOString(),
      source: 'outlook-addin-quick'
    };

    // Save to localStorage (shared with the main TaskFlow webapp
    // if opened in the same browser profile)
    try {
      const existing = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
      // Avoid duplicates by emailId
      const alreadyExists = existing.some(t => t.emailId === task.emailId);
      if (!alreadyExists) {
        existing.unshift(task);
        localStorage.setItem('taskflow_tasks', JSON.stringify(existing));
        showNotification('✅ Tarea añadida', `"${task.name.slice(0, 50)}" guardada en TaskFlow.`, 'informational');
      } else {
        showNotification('ℹ️ Ya existe', 'Este email ya tiene una tarea en TaskFlow.', 'informational');
      }
    } catch(e) {
      showNotification('❌ Error', 'No se pudo guardar la tarea: ' + e.message, 'errorMessage');
    }

    event.completed();
  }

  function showNotification(title, message, type) {
    Office.context.mailbox.item.notificationMessages.addAsync('taskflow', {
      type: Office.MailboxEnums.ItemNotificationMessageType[type] || 'informationalMessage',
      message: `${title}: ${message}`,
      icon: 'Icon.16',
      persistent: false
    });
  }
  </script>
</head>
<body></body>
</html>
