<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<script src="taskflow-db.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── DARK THEME (default) ── */
:root, :root[data-theme="dark"] {
  --bg:#08090e;--surface:#0f111a;--surface2:#181b27;--surface3:#202332;
  --border:#454a6a;--border2:#686e96;--text:#ffffff;--text2:#e0e4ff;--text3:#a0a8cc;
  --accent:#8b7eff;--accent2:#b0a6ff;--accent-dim:rgba(139,126,255,0.22);
  --green:#00f090;--green-dim:rgba(0,240,144,0.16);
  --orange:#ff9d2e;--orange-dim:rgba(255,157,46,0.16);
  --red:#ff4f4f;--red-dim:rgba(255,79,79,0.16);
  --yellow:#ffe033;--blue:#1ab8ff;--blue-dim:rgba(26,184,255,0.16);
  --ms:#1a9fff;--ms-dim:rgba(26,159,255,0.18);
  --check-done-text:#000;
}
/* ── LIGHT THEME ── */
:root[data-theme="light"] {
  --bg:#f4f5f9;--surface:#ffffff;--surface2:#eceef4;--surface3:#e2e4ed;
  --border:#c5c9db;--border2:#a8adc6;--text:#1a1c2b;--text2:#3a3d52;--text3:#6b7094;
  --accent:#6c5ce7;--accent2:#5a4bd1;--accent-dim:rgba(108,92,231,0.12);
  --green:#00b368;--green-dim:rgba(0,179,104,0.12);
  --orange:#e67e00;--orange-dim:rgba(230,126,0,0.10);
  --red:#d43535;--red-dim:rgba(212,53,53,0.10);
  --yellow:#c5a000;--blue:#0088cc;--blue-dim:rgba(0,136,204,0.10);
  --ms:#0068ba;--ms-dim:rgba(0,104,186,0.12);
  --check-done-text:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border2);padding:8px 12px 0;display:flex;flex-direction:column;gap:0;flex-shrink:0}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:6px}
.topbar-row2{display:flex;align-items:center;gap:6px;padding-bottom:8px}
.topbar-logo{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;flex-shrink:0}
.topbar-logo span{color:var(--accent)}
.topbar-byline{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.3px;white-space:nowrap;opacity:.7}
.topbar-tabs{display:flex;gap:5px;flex-wrap:nowrap}
.topbar-tab{padding:4px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);transition:all .12s;border:1.5px solid transparent;white-space:nowrap}
.topbar-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(139,126,255,.35)}
.topbar-tab:hover:not(.active){color:var(--text2);border-color:var(--border)}
.topbar-controls{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* ── LANG SELECTOR ── */
.lang-selector{position:relative}
.lang-btn{height:30px;padding:0 9px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text2);transition:all .2s;white-space:nowrap}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.lang-btn .lang-flag{font-size:13px}
.lang-btn .lang-code{font-size:10px;letter-spacing:.5px}
.lang-dropdown{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;z-index:300;min-width:120px;overflow:hidden;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.lang-dropdown.open{display:block;animation:fadeDown .14s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.lang-option{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:background .1s}
.lang-option:hover{background:var(--accent-dim);color:var(--accent)}
.lang-option.active{color:var(--accent);background:var(--accent-dim)}
.lang-option .lo-flag{font-size:14px}
.lang-option .lo-name{flex:1}

/* ── THEME TOGGLE ── */
.theme-toggle{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;padding:0;line-height:1}
.theme-toggle:hover{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.1)}

/* ── EMAIL CONTEXT CARD ── */
.email-card{background:var(--surface);border-bottom:1.5px solid var(--border);padding:12px 14px;flex-shrink:0}
.email-card-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.email-subject{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.email-from{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.email-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-pinned{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(139,126,255,.35)}
.badge-flagged{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,79,79,.35)}
.badge-attach{background:var(--surface3);color:var(--text2);border:1px solid var(--border2)}
.badge-linked{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,240,144,.35)}

/* ── LINKED TASK BANNER ── */
.linked-task-banner{display:none;padding:10px 14px;background:var(--surface2);border-bottom:1.5px solid var(--border);flex-shrink:0}
.linked-banner-inner{display:flex;align-items:center;gap:8px;background:var(--green-dim);border:1px solid rgba(0,240,144,.3);border-radius:8px;padding:8px 10px}
.linked-banner-icon{font-size:16px;flex-shrink:0}
.linked-banner-text{flex:1;min-width:0}
.linked-banner-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);margin-bottom:2px}
.linked-banner-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linked-banner-actions{display:flex;gap:5px;flex-shrink:0}
.btn-icon{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);transition:all .12s;font-family:'Syne',sans-serif;white-space:nowrap}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn-icon.edit{border-color:rgba(139,126,255,.4);color:var(--accent);background:var(--accent-dim)}
.btn-icon.edit:hover{background:var(--accent);color:#fff}

/* ── QUICK CREATE ── */
.quick-create{padding:14px;background:var(--surface2);border-bottom:1.5px solid var(--border);flex-shrink:0}
.quick-create-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.field-group{margin-bottom:10px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.field-label-hint{font-size:10px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--text3);opacity:.85;font-style:italic}
.quick-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.q-select,.q-input{background:var(--surface3);border:1.5px solid var(--border2);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;outline:none;width:100%;cursor:pointer;transition:border-color .12s}
.q-select:focus,.q-input:focus{border-color:var(--accent)}
.q-select option{background:var(--surface3);color:var(--text)}
.q-input::placeholder{color:var(--text3);font-weight:400}
/* followup chips removed - replaced by number input */
.followup-input-wrap{display:flex;align-items:center;gap:8px}
.followup-num{background:var(--surface3);border:1.5px solid var(--border2);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;font-weight:700;outline:none;width:72px;text-align:center;transition:border-color .12s}
.followup-num:focus{border-color:var(--blue)}
.followup-num-label{font-size:12px;color:var(--text3);font-weight:600}
.resp-chips{display:flex;gap:5px;margin-bottom:6px}
.resp-chip{flex:1;padding:7px 6px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);text-align:center;transition:all .12s}
.resp-chip.active-me{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.resp-chip.active-other{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.resp-chip:hover:not(.active-me):not(.active-other){color:var(--text);border-color:var(--border2)}
.person-input-wrap{position:relative}
.person-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 6px 6px;z-index:100;max-height:120px;overflow-y:auto;display:none}
.person-option{padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:background .1s}
.person-option:hover{background:var(--accent-dim);color:var(--accent)}
.btn-create{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px}
.btn-create:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-create:disabled{opacity:.5;cursor:not-allowed;transform:none}
.success-flash{background:var(--green-dim);border:1px solid rgba(0,240,144,.35);color:var(--green);border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;text-align:center;display:none;margin-top:8px}

/* ── QUICK FILTERS ── */
.quick-filters{display:none;padding:8px 14px 4px;gap:6px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--border)}
.quick-filters.visible{display:flex}
.qf-select{font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text1);padding:3px 6px;cursor:pointer;height:26px}
.qf-select:focus{outline:none;border-color:var(--accent)}
.qf-reset{font-size:11px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text3);padding:3px 8px;cursor:pointer;height:26px}
.qf-reset:hover{border-color:var(--accent);color:var(--accent)}
/* ── TASK LIST ── */
.tasks-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.tasks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tasks-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3)}
.tasks-count{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface3);padding:1px 7px;border-radius:20px;border:1px solid var(--border2)}
.task-item{background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .12s;position:relative}
.task-item:hover{border-color:var(--accent);background:var(--surface2)}
.task-item:hover .ti-edit-hint{opacity:1}
.ti-edit-hint{position:absolute;top:8px;right:8px;font-size:11px;opacity:0;transition:opacity .15s;color:var(--accent2);pointer-events:none}
.task-item.is-current-email{border-color:var(--accent);border-left:3px solid var(--accent)}
.task-item.done{opacity:.5}
.task-item.done .ti-name{text-decoration:line-through;color:var(--text3)}
.ti-top{display:flex;align-items:flex-start;gap:8px}
.ti-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .12s}
.ti-check:hover{border-color:var(--green)}.ti-check.checked{background:var(--green);border-color:var(--green);color:var(--check-done-text)}
.ti-name{font-size:12px;font-weight:700;color:var(--text);flex:1;line-height:1.3}
.ti-icons{display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap}
.ti-priority{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;border:1.5px solid;flex-shrink:0}
.p1{color:var(--red);border-color:var(--red);background:var(--red-dim)}
.p2{color:var(--orange);border-color:var(--orange);background:var(--orange-dim)}
.p3{color:var(--yellow);border-color:rgba(255,224,51,.4);background:rgba(255,224,51,.08)}
.p4{color:var(--blue);border-color:rgba(26,184,255,.4);background:var(--blue-dim)}
.p5{color:var(--text3);border-color:var(--border2);background:var(--surface3)}
.ti-chip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;background:var(--surface3);color:var(--text2);border:1px solid var(--border2)}
.ti-chip.followup{background:var(--blue-dim);color:var(--blue);border-color:rgba(26,184,255,.3)}
.ti-chip.responsible{background:var(--accent-dim);color:var(--accent);border-color:rgba(139,126,255,.3)}
.ti-chip.email{background:var(--ms-dim);color:#7ec5ff;border-color:rgba(26,159,255,.3)}
.ti-chip.done-chip{background:var(--green-dim);color:var(--green);border-color:rgba(0,240,144,.3)}
.ti-chip.pending{background:rgba(255,224,51,.1);color:var(--yellow);border-color:rgba(255,224,51,.3)}
.ti-chip.progress{background:var(--blue-dim);color:var(--blue);border-color:rgba(26,184,255,.3)}
.empty-msg{color:var(--text3);font-size:12px;text-align:center;padding:30px 10px;line-height:1.6}

/* ── EDIT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-sheet{background:var(--surface);border-top:2px solid var(--accent);border-radius:14px 14px 0 0;padding:16px 14px 20px;width:100%;max-height:90vh;overflow-y:auto;flex-shrink:0}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:800;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);transition:all .12s}
.modal-close:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.modal-email-origin{display:none;background:var(--ms-dim);border:1px solid rgba(26,159,255,.3);border-radius:7px;padding:7px 10px;margin-bottom:12px;gap:6px;align-items:flex-start}
.modal-email-origin.visible{display:flex}
.modal-email-origin-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.modal-email-origin-text{flex:1;min-width:0}
.modal-email-origin-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--ms);margin-bottom:2px}
.modal-email-origin-subject{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-field{margin-bottom:12px}
.modal-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.modal-label-desc{font-size:10px;font-weight:500;text-transform:none;letter-spacing:0;color:var(--text3);font-style:italic}
.modal-input,.modal-select,.modal-textarea{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;outline:none;width:100%;transition:border-color .12s}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--accent)}
.modal-select option{background:var(--surface2);color:var(--text)}
.modal-textarea{resize:vertical;min-height:60px;font-weight:400;line-height:1.5}
.modal-input::placeholder,.modal-textarea::placeholder{color:var(--text3);font-weight:400}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.btn-save{flex:1;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-save:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-delete{padding:9px 14px;background:var(--red-dim);color:var(--red);border:1.5px solid rgba(255,79,79,.3);border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-delete:hover{background:var(--red);color:#fff;border-color:var(--red)}


/* ── VIEWS PAGE ── */
.views-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.views-selector{display:flex;gap:5px;padding:10px 14px 6px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.view-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);transition:all .12s;white-space:nowrap}
.view-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(139,126,255,.35)}
.view-btn:hover:not(.active){color:var(--text2);border-color:var(--border2)}
.views-project-select{padding:8px 14px 4px;flex-shrink:0}

/* ── CONFIG PAGE ── */
.config-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.config-section{background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;overflow:hidden}
.config-section-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.config-section-icon{font-size:14px;flex-shrink:0}
.config-section-title{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
.config-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.config-field{display:flex;flex-direction:column;gap:5px}
.config-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3)}
.config-select{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;outline:none;width:100%;cursor:pointer;transition:border-color .12s}
.config-select:focus{border-color:var(--accent)}
.config-select option{background:var(--surface2);color:var(--text)}
.config-num{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;font-weight:700;outline:none;width:80px;text-align:center;transition:border-color .12s}
.config-num:focus{border-color:var(--accent)}
.config-num-row{display:flex;align-items:center;gap:10px}
.config-num-label{font-size:12px;color:var(--text3);font-weight:600}
.config-hint{font-size:10px;color:var(--text3);line-height:1.5;font-style:italic}
.config-save-wrap{padding:0 14px 14px}
.btn-config-save{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-config-save:hover{background:var(--accent2);transform:translateY(-1px)}
.config-saved-flash{text-align:center;font-size:11px;font-weight:700;color:var(--green);padding:4px;display:none}


/* ── MODAL SEPARATOR ── */
.modal-separator{height:1.5px;background:var(--border);margin:14px 0}

/* ── TIME TRACKING ── */
.time-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.time-section-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:5px}
.time-total-badge{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,157,46,.3)}
.time-log-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:120px;overflow-y:auto}
.time-log-item{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px}
.time-log-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;min-width:36px}
.time-log-mins{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--orange);flex-shrink:0;min-width:46px}
.time-log-note{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.time-log-del{width:16px;height:16px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text3);font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0;font-family:'Syne',sans-serif}
.time-log-del:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.time-add-row{display:flex;gap:6px;align-items:center}
.time-mins-input{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;font-weight:700;outline:none;width:62px;text-align:center;transition:border-color .12s;-moz-appearance:textfield}
.time-mins-input:focus{border-color:var(--orange)}
.time-mins-input::-webkit-inner-spin-button,.time-mins-input::-webkit-outer-spin-button{-webkit-appearance:none}
.time-note-input{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:400;outline:none;flex:1;transition:border-color .12s}
.time-note-input:focus{border-color:var(--orange)}
.time-note-input::placeholder{color:var(--text3)}
.btn-time-add{padding:6px 11px;background:var(--orange-dim);color:var(--orange);border:1.5px solid rgba(255,157,46,.35);border-radius:6px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.btn-time-add:hover{background:var(--orange);color:#fff}
.time-empty{font-size:11px;color:var(--text3);padding:6px 0;font-style:italic}
.ti-chip.time{background:var(--orange-dim);color:var(--orange);border-color:rgba(255,157,46,.3)}

/* ── FOLLOWUP DATE ── */
.followup-date-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.followup-date-display{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-dim);padding:3px 9px;border-radius:6px;border:1px solid rgba(26,184,255,.3)}
.ti-chip.followup-due{background:var(--blue-dim);color:var(--blue);border-color:rgba(26,184,255,.3)}
.ti-chip.followup-overdue{background:var(--red-dim);color:var(--red);border-color:rgba(255,79,79,.3)}

/* ── RELATED TASKS ── */
.related-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.related-item{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;cursor:pointer;transition:all .12s}
.related-item:hover{border-color:var(--accent)}
.related-item-name{font-size:11px;font-weight:600;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.related-item-prio{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;border:1.5px solid;flex-shrink:0}
.related-del{width:16px;height:16px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text3);font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0;font-family:'Syne',sans-serif}
.related-del:hover{border-color:var(--red);color:var(--red)}
.related-add-wrap{position:relative}
.related-search{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:400;outline:none;width:100%;transition:border-color .12s}
.related-search:focus{border-color:var(--accent)}
.related-search::placeholder{color:var(--text3)}
.related-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 7px 7px;z-index:150;max-height:130px;overflow-y:auto;display:none}
.related-dropdown.open{display:block}
.related-opt{padding:7px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:background .1s;border-bottom:1px solid var(--border)}
.related-opt:last-child{border-bottom:none}
.related-opt:hover{background:var(--accent-dim);color:var(--accent)}
.related-opt-new{color:var(--green);font-style:italic}

/* ── RECURRENT TASK ── */
.recur-toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.recur-toggle-label{font-size:12px;font-weight:600;color:var(--text2);flex:1}
.toggle-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border:1.5px solid var(--border2);border-radius:20px;cursor:pointer;transition:all .2s}
.toggle-slider:before{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--text3);left:3px;top:50%;transform:translateY(-50%);transition:all .2s}
.toggle-switch input:checked + .toggle-slider{background:var(--green-dim);border-color:var(--green)}
.toggle-switch input:checked + .toggle-slider:before{background:var(--green);left:18px}
.recur-config{display:none;flex-direction:column;gap:8px}
.recur-config.visible{display:flex}
.recur-type-row{display:flex;gap:6px;flex-wrap:wrap}
.recur-type-btn{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text3);transition:all .12s;white-space:nowrap}
.recur-type-btn.active{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.recur-type-btn:hover:not(.active){color:var(--text2);border-color:var(--border2)}
/* Sub-configs per tipus */
.recur-sub{display:none;flex-direction:column;gap:8px}
.recur-sub.visible{display:flex}
.recur-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.recur-label{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap}
.recur-num{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;font-weight:700;outline:none;width:54px;text-align:center;transition:border-color .12s;-moz-appearance:textfield}
.recur-num:focus{border-color:var(--green)}
.recur-num::-webkit-inner-spin-button{-webkit-appearance:none}
.recur-sel{background:var(--surface2);border:1.5px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;outline:none;cursor:pointer;transition:border-color .12s}
.recur-sel:focus{border-color:var(--green)}
.recur-sel option{background:var(--surface2);color:var(--text)}
/* Weekday chips */
.recur-weekdays{display:flex;gap:4px;flex-wrap:wrap}
.recur-wd{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .12s}
.recur-wd.active{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.recur-wd:hover:not(.active){color:var(--text2);border-color:var(--border2)}
.recur-hint{font-size:10px;color:var(--text3);font-style:italic;line-height:1.4}
.ti-chip.recur{background:rgba(0,240,144,.08);color:var(--green);border-color:rgba(0,240,144,.3)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:var(--text3);font-size:12px}
.dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
/* ── TRANSITIONS ── */
body,.topbar,.topbar-row1,.topbar-row2,.email-card,.quick-create,.tasks-area,.task-item,.ti-check,
.q-select,.q-input,.resp-chip,.followup-chip,.btn-create,.success-flash,
.badge,.ti-chip,.ti-priority,.tasks-count,.theme-toggle,.lang-btn,
.modal-sheet,.modal-input,.modal-select,.modal-textarea,
.linked-task-banner,.btn-icon{transition:background .2s,color .2s,border-color .2s}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <!-- FILA 1: logo + controls -->
  <div class="topbar-row1">
    <div class="topbar-logo">Task<span>Flow</span></div>
    <div class="topbar-controls">
      <!-- LANG SELECTOR -->
      <div class="lang-selector" id="lang-selector">
        <button class="lang-btn" onclick="toggleLangDropdown()" id="lang-btn" title="Language / Idioma">
          <span class="lang-flag" id="lang-flag">🏳️</span>
          <span class="lang-code" id="lang-code">CA</span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown">
          <div class="lang-option" onclick="setLang('ca')">
            <span class="lo-flag">🇪🇸</span><span class="lo-name">Català</span>
          </div>
          <div class="lang-option" onclick="setLang('es')">
            <span class="lo-flag">🇪🇸</span><span class="lo-name">Castellano</span>
          </div>
          <div class="lang-option" onclick="setLang('en')">
            <span class="lo-flag">🇬🇧</span><span class="lo-name">English</span>
          </div>
        </div>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
  <!-- FILA 2: byline + tabs -->
  <div class="topbar-row2">
    <span class="topbar-byline">by Xavi Croix</span>
    <div class="topbar-tabs">
      <div class="topbar-tab active" id="tab-email" onclick="switchTab('email')" data-i18n="tab_email">—</div>
      <div class="topbar-tab" id="tab-all" onclick="switchTab('all')" data-i18n="tab_all">—</div>
      <div class="topbar-tab" id="tab-views" onclick="switchTab('views')" data-i18n="tab_views">—</div>
      <div class="topbar-tab" id="tab-config" onclick="switchTab('config')">⚙️</div>
    </div>
  </div>
</div>

<!-- EMAIL CONTEXT CARD -->
<div class="email-card" id="email-card">
  <div class="email-card-label" data-i18n="email_active">—</div>
  <div class="email-subject" id="email-subject">—</div>
  <div class="email-from" id="email-from"></div>
  <div class="email-badges" id="email-badges"></div>
</div>

<!-- LINKED TASK BANNER -->
<div class="linked-task-banner" id="linked-task-banner">
  <div class="linked-banner-inner">
    <div class="linked-banner-icon">✅</div>
    <div class="linked-banner-text">
      <div class="linked-banner-label" data-i18n="linked_label">—</div>
      <div class="linked-banner-name" id="linked-task-name">—</div>
    </div>
    <div class="linked-banner-actions">
      <button class="btn-icon edit" onclick="editLinkedTask()" data-i18n="btn_edit">—</button>
    </div>
  </div>
</div>

<!-- QUICK CREATE -->
<div class="quick-create" id="quick-create-section">
  <div class="quick-create-title" data-i18n="create_title">—</div>

  <div class="quick-row">
    <div class="field-group" style="margin:0">
      <div class="field-label" data-i18n="lbl_priority">—</div>
      <select class="q-select" id="q-priority"></select>
    </div>
    <div class="field-group" style="margin:0">
      <div class="field-label" data-i18n="lbl_project">—</div>
      <div class="person-input-wrap">
        <input class="q-input" id="q-project-input" type="text"
          oninput="onProjectInput('q', this.value)" onblur="hideProjectDropdown('q')"
          autocomplete="off">
        <div class="person-dropdown" id="q-project-dropdown"></div>
      </div>
    </div>
  </div>

  <div class="field-group">
    <div class="field-label">
      👁️ <span data-i18n="lbl_followup">—</span>
    </div>
    <div class="followup-input-wrap">
      <input class="followup-num" id="followup-days-input" type="number"
        min="0" max="365" value="2"
        oninput="currentFollowupDays=parseInt(this.value)||0">
      <span class="followup-num-label" data-i18n="followup_days_label">—</span>
    </div>
  </div>

  <div class="field-group">
    <div class="field-label">
      🙋 <span data-i18n="lbl_responsible">—</span>
      <span class="field-label-hint" data-i18n="hint_responsible">—</span>
    </div>
    <div class="resp-chips">
      <div class="resp-chip active-me" id="resp-me" onclick="selectResp('me')" data-i18n="resp_me">—</div>
      <div class="resp-chip" id="resp-other" onclick="selectResp('other')" data-i18n="resp_other">—</div>
    </div>
    <div id="resp-person-wrap" style="display:none">
      <div class="person-input-wrap">
        <input class="q-input" id="q-person-name" type="text"
          oninput="onPersonInput(this.value)" onblur="hidePersonDropdown()" autocomplete="off">
        <div class="person-dropdown" id="person-dropdown"></div>
      </div>
    </div>
  </div>

  <button class="btn-create" id="btn-create" onclick="createTaskFromEmail()">
    ＋ <span data-i18n="btn_create_task">—</span>
  </button>
  <div class="success-flash" id="success-flash"></div>
</div>

<!-- QUICK FILTERS (only for 'all' tab) -->
<div class="quick-filters" id="quick-filters-bar">
  <select class="qf-select" id="qf-priority" onchange="renderTasks()">
    <option value="" data-i18n="qf_all_priorities">—</option>
    <option value="1">🔴 1</option>
    <option value="2">🟠 2</option>
    <option value="3">🟡 3</option>
    <option value="4">🔵 4</option>
    <option value="5">⚪ 5</option>
  </select>
  <select class="qf-select" id="qf-status" onchange="renderTasks()">
    <option value="" data-i18n="qf_all_statuses">—</option>
    <option value="pending" data-i18n="status_pending">—</option>
    <option value="in-progress" data-i18n="status_progress">—</option>
    <option value="done" data-i18n="status_done">—</option>
  </select>
  <select class="qf-select" id="qf-resp" onchange="renderTasks()">
    <option value="" data-i18n="qf_all_resp">—</option>
    <option value="me" data-i18n="qf_resp_me">—</option>
    <option value="other" data-i18n="qf_resp_other">—</option>
  </select>
  <select class="qf-select" id="qf-project" onchange="renderTasks()">
    <option value="" data-i18n="qf_all_projects">—</option>
  </select>
  <button class="qf-reset" onclick="resetFilters()" data-i18n="qf_reset">—</button>
</div>

<!-- TASK LIST -->
<div class="tasks-area" id="tasks-area">
  <div class="tasks-header">
    <span class="tasks-title" id="tasks-title">—</span>
    <span class="tasks-count" id="tasks-count">0</span>
  </div>
  <div id="task-list-inner">
    <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div> <span data-i18n="loading">—</span></div>
  </div>
</div>


<!-- VIEWS PAGE -->
<div class="views-area" id="views-area" style="display:none">

  <!-- Selector de vista -->
  <div class="views-selector">
    <button class="view-btn active" id="vbtn-mine"    onclick="selectView('mine')"    data-i18n="view_mine">—</button>
    <button class="view-btn"        id="vbtn-followup" onclick="selectView('followup')" data-i18n="view_followup">—</button>
    <button class="view-btn"        id="vbtn-project"  onclick="selectView('project')"  data-i18n="view_project">—</button>
  </div>

  <!-- Selector de projecte (només visible a 'project') -->
  <div class="views-project-select" id="views-project-select" style="display:none">
    <select class="qf-select" id="vf-project" onchange="renderViews()" style="width:100%;height:30px;font-size:12px">
      <option value="" data-i18n="view_all_projects">—</option>
    </select>
  </div>

  <!-- Llista de tasques de la vista -->
  <div class="tasks-area" id="views-task-area" style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px">
    <div class="tasks-header">
      <span class="tasks-title" id="views-title">—</span>
      <span class="tasks-count" id="views-count">0</span>
    </div>
    <div id="views-list-inner"></div>
  </div>

</div>

<!-- CONFIG PAGE -->
<div class="config-area" id="config-area" style="display:none">

  <!-- Marca de seguiment (Flag) -->
  <div class="config-section">
    <div class="config-section-header">
      <span class="config-section-icon">🚩</span>
      <span class="config-section-title" data-i18n="cfg_flag_title">—</span>
    </div>
    <div class="config-body">
      <div class="config-field">
        <div class="config-label" data-i18n="cfg_flag_label">—</div>
        <select class="config-select" id="cfg-flag-meaning">
          <option value="followup" data-i18n="cfg_meaning_followup">—</option>
          <option value="pending_response" data-i18n="cfg_meaning_pending">—</option>
          <option value="important" data-i18n="cfg_meaning_important">—</option>
          <option value="none" data-i18n="cfg_meaning_none">—</option>
        </select>
        <div class="config-hint" data-i18n="cfg_flag_hint">—</div>
      </div>
    </div>
  </div>

  <!-- Pin d'Outlook -->
  <div class="config-section">
    <div class="config-section-header">
      <span class="config-section-icon">📌</span>
      <span class="config-section-title" data-i18n="cfg_pin_title">—</span>
    </div>
    <div class="config-body">
      <div class="config-field">
        <div class="config-label" data-i18n="cfg_pin_label">—</div>
        <select class="config-select" id="cfg-pin-meaning">
          <option value="followup" data-i18n="cfg_meaning_followup">—</option>
          <option value="pending_response" data-i18n="cfg_meaning_pending">—</option>
          <option value="important" data-i18n="cfg_meaning_important">—</option>
          <option value="none" data-i18n="cfg_meaning_none">—</option>
        </select>
        <div class="config-hint" data-i18n="cfg_pin_hint">—</div>
      </div>
    </div>
  </div>

  <!-- Dies de seguiment per defecte -->
  <div class="config-section">
    <div class="config-section-header">
      <span class="config-section-icon">👁️</span>
      <span class="config-section-title" data-i18n="cfg_followup_title">—</span>
    </div>
    <div class="config-body">
      <div class="config-field">
        <div class="config-label" data-i18n="cfg_followup_label">—</div>
        <div class="config-num-row">
          <input class="config-num" id="cfg-followup-days" type="number" min="0" max="365" value="2">
          <span class="config-num-label" data-i18n="followup_days_label">—</span>
        </div>
        <div class="config-hint" data-i18n="cfg_followup_hint">—</div>
      </div>
    </div>
  </div>

  <!-- Idioma preferit -->
  <div class="config-section">
    <div class="config-section-header">
      <span class="config-section-icon">🌐</span>
      <span class="config-section-title" data-i18n="cfg_lang_title">—</span>
    </div>
    <div class="config-body">
      <div class="config-field">
        <div class="config-label" data-i18n="cfg_lang_label">—</div>
        <select class="config-select" id="cfg-lang">
          <option value="auto" data-i18n="cfg_lang_auto">—</option>
          <option value="ca">🇪🇸 Català</option>
          <option value="es">🇪🇸 Castellano</option>
          <option value="en">🇬🇧 English</option>
        </select>
        <div class="config-hint" data-i18n="cfg_lang_hint">—</div>
      </div>
    </div>
  </div>

  <!-- Botó desar -->
  <div class="config-save-wrap">
    <button class="btn-config-save" onclick="saveConfig()">💾 <span data-i18n="cfg_save">—</span></button>
    <div class="config-saved-flash" id="config-saved-flash" data-i18n="cfg_saved">—</div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="onModalOverlayClick(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">✏️ <span data-i18n="modal_title">—</span></div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>

    <!-- Email origen de la tasca -->
    <div class="modal-email-origin" id="edit-email-origin">
      <div class="modal-email-origin-icon">📧</div>
      <div class="modal-email-origin-text">

const LANG_META = {
  ca: { flag: '🏳️', code: 'CA', htmlLang: 'ca' },
  es: { flag: '🇪🇸', code: 'ES', htmlLang: 'es' },
  en: { flag: '🇬🇧', code: 'EN', htmlLang: 'en' },
};

const LANG_KEY   = 'taskflow_lang';
const CONFIG_KEY  = 'taskflow_config';

// ── CONFIG HELPERS ────────────────────────────────────────────
function getConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveConfig() {
  const cfg = {
    flagMeaning:    document.getElementById('cfg-flag-meaning').value,
    pinMeaning:     document.getElementById('cfg-pin-meaning').value,
    defaultFollowup: parseInt(document.getElementById('cfg-followup-days').value) || 2,
    lang:           document.getElementById('cfg-lang').value,
  };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));

  // Aplicar followup per defecte globalment
  currentFollowupDays = cfg.defaultFollowup;
  const fInp = document.getElementById('followup-days-input');
  if (fInp) fInp.value = currentFollowupDays;

  // Aplicar idioma
  if (cfg.lang && cfg.lang !== 'auto') {
    setLang(cfg.lang);
  } else if (cfg.lang === 'auto') {
    setLang(detectSystemLang());
  }

  // Flash de desat
  const flash = document.getElementById('config-saved-flash');
  if (flash) {
    flash.style.display = 'block';
    setTimeout(() => flash.style.display = 'none', 2500);
  }
}
function loadConfigUI() {
  const cfg = getConfig();
  const flagSel = document.getElementById('cfg-flag-meaning');
  if (flagSel) flagSel.value = cfg.flagMeaning || 'followup';
  const pinSel = document.getElementById('cfg-pin-meaning');
  if (pinSel) pinSel.value = cfg.pinMeaning || 'followup';
  const fDays = document.getElementById('cfg-followup-days');
  if (fDays) fDays.value = cfg.defaultFollowup !== undefined ? cfg.defaultFollowup : 2;
  const langSel = document.getElementById('cfg-lang');
  if (langSel) langSel.value = cfg.lang || 'auto';
}
function detectSystemLang() {
  // Intenta detectar l'idioma d'Outlook o del navegador
  try {
    const ol = Office.context.displayLanguage || '';
    if (ol.startsWith('ca')) return 'ca';
    if (ol.startsWith('es')) return 'es';
    if (ol.startsWith('en')) return 'en';
  } catch(e) {}
  const nav = (navigator.language || navigator.userLanguage || 'ca').toLowerCase();
  if (nav.startsWith('ca')) return 'ca';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('en')) return 'en';
  return 'ca'; // fallback
}

let currentLang = 'ca';

// ── t() — translate key ────────────────────────────────────────
function t(key) {
  return (I18N[currentLang] || I18N.ca)[key] || key;
}

// ── APPLY LANGUAGE ─────────────────────────────────────────────
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);

  const meta = LANG_META[lang] || LANG_META.ca;
  document.documentElement.lang = meta.htmlLang;
  document.getElementById('lang-flag').textContent = meta.flag;
  document.getElementById('lang-code').textContent = meta.code;

  // Mark active option
  document.querySelectorAll('.lang-option').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `setLang('${lang}')`);
  });

  // Re-render all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });

  // Theme toggle title
  const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) themeBtn.title = isDark ? t('theme_to_light') : t('theme_to_dark');

  // Rebuild dynamic elements that depend on language
  buildPriorityOptions('q-priority',    parseInt(document.getElementById('q-priority')?.value) || 3);
  buildPriorityOptions('edit-priority', parseInt(document.getElementById('edit-priority')?.value) || 3);
  buildStatusOptions('edit-status', document.getElementById('edit-status')?.value || 'pending');

  // Followup labels
  document.querySelectorAll('[data-i18n="followup_days_label"]').forEach(el => el.textContent = t('followup_days_label'));

  // Project placeholders
  const qProj = document.getElementById('q-project-input');
  if (qProj) qProj.placeholder = t('project_placeholder');
  const eProj = document.getElementById('edit-project-input');
  if (eProj) eProj.placeholder = t('project_placeholder');

  // Person placeholders
  const qPerson = document.getElementById('q-person-name');
  if (qPerson) qPerson.placeholder = t('person_placeholder');
  const ePerson = document.getElementById('edit-person-name');
  if (ePerson) ePerson.placeholder = t('person_placeholder');
  const eName = document.getElementById('edit-name');
  if (eName) eName.placeholder = t('task_placeholder');
  const eDesc = document.getElementById('edit-desc');
  if (eDesc) eDesc.placeholder = t('desc_placeholder');

  // Tasks title for current tab
  const titlesMap = { email: t('tasks_related'), all: t('tasks_all') };
  const titleEl = document.getElementById('tasks-title');
  if (titleEl) titleEl.textContent = titlesMap[currentTab] || t('tasks_related');

  // Vendor placeholder
  const eVendor = document.getElementById('edit-vendor');
  if (eVendor) eVendor.placeholder = t('vendor_placeholder');

  // Quick filter selects — re-traduir opcions
  const qfPrio = document.getElementById('qf-priority');
  if (qfPrio && qfPrio.options[0]) qfPrio.options[0].textContent = t('qf_all_priorities');
  const qfStatus = document.getElementById('qf-status');
  if (qfStatus) {
    if (qfStatus.options[0]) qfStatus.options[0].textContent = t('qf_all_statuses');
    if (qfStatus.options[1]) qfStatus.options[1].textContent = t('status_pending');
    if (qfStatus.options[2]) qfStatus.options[2].textContent = t('status_progress');
    if (qfStatus.options[3]) qfStatus.options[3].textContent = t('status_done');
  }
  const qfResp = document.getElementById('qf-resp');
  if (qfResp) {
    if (qfResp.options[0]) qfResp.options[0].textContent = t('qf_all_resp');
    if (qfResp.options[1]) qfResp.options[1].textContent = t('qf_resp_me');
    if (qfResp.options[2]) qfResp.options[2].textContent = t('qf_resp_other');
  }
  const qfProject = document.getElementById('qf-project');
  if (qfProject && qfProject.options[0]) qfProject.options[0].textContent = t('qf_all_projects');
  const qfReset = document.getElementById('quick-filters-bar')?.querySelector('.qf-reset');
  if (qfReset) qfReset.textContent = t('qf_reset');

  // Retraduir botons de vista si la pàgina és visible
  document.querySelectorAll('.view-btn[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  const vfp2 = document.getElementById('vf-project');
  if (vfp2 && vfp2.options[0]) vfp2.options[0].textContent = t('view_all_projects');

  // Re-render task list to update chips/labels
  renderTasks();
  if (currentTab === 'views') renderViews();
}

function setLang(lang) {
  applyLang(lang);
  closeLangDropdown();
}

  document.getElementById('lang-dropdown').classList.remove('open');

// ── BUILD DYNAMIC SELECT OPTIONS ──────────────────────────────
function buildPriorityOptions(selectId, selectedVal) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const labels = t('priority_labels');
  sel.innerHTML = labels.map((lbl, i) =>
    `<option value="${i+1}"${selectedVal === i+1 ? ' selected' : ''}>${lbl}</option>`
  ).join('');
}

function buildStatusOptions(selectId, selectedVal) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const opts = [
    { v:'pending',     lbl: t('status_pending')  },
    { v:'in-progress', lbl: t('status_progress') },
    { v:'done',        lbl: t('status_done')      },
  ];
  sel.innerHTML = opts.map(o =>
    `<option value="${o.v}"${selectedVal === o.v ? ' selected' : ''}>${o.lbl}</option>`
  ).join('');
}

// ── PERSONS MEMORY ────────────────────────────────────────────
function getPersons() {
  try { return JSON.parse(localStorage.getItem(PERSONS_KEY) || '[]'); }
  catch(e) { return []; }
}
function savePerson(name) {
  if (!name?.trim()) return;
  const list = getPersons();
  const trimmed = name.trim();
  if (!list.includes(trimmed)) {
    list.unshift(trimmed);
    if (list.length > 30) list.pop();
    localStorage.setItem(PERSONS_KEY, JSON.stringify(list));
  }
}

// ── THEME ────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  const isDark = theme === 'dark';
  if (btn) btn.textContent = isDark ? '🌙' : '☀️';
  if (btn) btn.title = isDark ? t('theme_to_light') : t('theme_to_dark');
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next);
}

// Apply saved theme + lang immediately (before Office.onReady) to prevent flash
(function() {
  const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

  // Idioma: usar el desat, o detectar del sistema si config diu 'auto' o no n'hi ha
  const savedLang = localStorage.getItem(LANG_KEY);
  const cfgRaw = localStorage.getItem(CONFIG_KEY);
  let cfgLang = 'ca';
  try {
    const cfgObj = cfgRaw ? JSON.parse(cfgRaw) : {};
    if (cfgObj.lang && cfgObj.lang !== 'auto') {
      cfgLang = cfgObj.lang;
    } else if (!savedLang || cfgObj.lang === 'auto') {
      // Detectar del navegador/sistema (Office no disponible aquí encara)
      const nav = (navigator.language || navigator.userLanguage || 'ca').toLowerCase();
      cfgLang = nav.startsWith('ca') ? 'ca' : nav.startsWith('es') ? 'es' : nav.startsWith('en') ? 'en' : 'ca';
    } else {
      cfgLang = savedLang;
    }
  } catch(e) { cfgLang = savedLang || 'ca'; }
  // applyLang tradueix tota la UI immediatament, sense esperar Office.onReady
  applyLang(cfgLang);
})();

// ── INIT ──────────────────────────────────────────────────────
Office.onReady(async (info) => {
  // Inicialitzar la BD sempre, independentment del host
  await TaskFlowDB.init();
  await loadData();

  // ✅ Re-aplicar traduccions ara que el DOM és complet (fix per Outlook)
  const savedLang = localStorage.getItem(LANG_KEY);
  const cfgOnReady = getConfig();
  let langOnReady = 'ca';
  if (cfgOnReady.lang && cfgOnReady.lang !== 'auto') {
    langOnReady = cfgOnReady.lang;
  } else if (savedLang) {
    langOnReady = savedLang;
  } else {
    langOnReady = detectSystemLang();
  }
  applyLang(langOnReady); // Re-aplicar després que el DOM i Office estan llests

  // Aplicar configuració desada
  const cfg = getConfig();
  if (cfg.defaultFollowup !== undefined) currentFollowupDays = cfg.defaultFollowup;
  const fInp = document.getElementById('followup-days-input');
  if (fInp) fInp.value = currentFollowupDays;

  // Sincronitzar i lligar context d'email només si estem a Outlook
  if (info.host === Office.HostType.Outlook) {
    await syncFromRoaming();
    bindEmailContext();
    Office.context.mailbox.addHandlerAsync(
      Office.EventType.ItemChanged,
      () => bindEmailContext()
    );
  } else {
    // Mode fora d'Outlook: mostrar totes les tasques
    renderTasks();
  }
});

async function loadData() {
  tasks    = await TaskFlowDB.getAllTasks();
  projects = await TaskFlowDB.getAllProjects();
}
async function saveTask(task) {
  await TaskFlowDB.putTask(task);
  tasks = await TaskFlowDB.getAllTasks();
  syncToRoaming();
}

// ── ROAMING ───────────────────────────────────────────────────
function syncToRoaming() {
  try {
    const roaming = Office.context.roamingSettings;
    const slim = tasks.slice(0, 50).map(t => ({
      id:t.id, name:t.name, emailId:t.emailId, status:t.status,
      priority:t.priority, resp:t.resp, project:t.project, created:t.created
    }));
    roaming.set(ROAMING_KEY, JSON.stringify(slim));
    roaming.saveAsync();
  } catch(e) {}
}
async function syncFromRoaming() {
  try {
    const roaming = Office.context.roamingSettings;
    const raw = roaming.get(ROAMING_KEY);
    if (!raw) return;
    const remote = JSON.parse(raw);
    const localIds = new Set(tasks.map(t => t.id));
    const toAdd = remote.filter(rt => !localIds.has(rt.id));
    if (toAdd.length > 0) {
      await TaskFlowDB.putTasks(toAdd);
      tasks = await TaskFlowDB.getAllTasks();
    }
  } catch(e) {}
}

// ── EMAIL CONTEXT ─────────────────────────────────────────────

// Normalitza un itemId d'Outlook eliminant el prefix EWS i posant-lo en minúscules.
// Outlook pot retornar el mateix missatge amb formats lleugerament diferents
// segons si l'add-in s'executa en mode REST o EWS, o entre sessions.
function normalizeId(id) {
  if (!id) return '';
  // Elimina possibles prefixos "AAMkAD..." o codificació URL, i normalitza
  return String(id).trim().toLowerCase();
}

async function bindEmailContext() {
  officeItem = Office.context.mailbox.item;
  if (!officeItem) return;

  // Assegurem que les dades estan carregades abans de comparar
  await loadData();

  // Normalitzem els IDs per evitar discrepàncies de format EWS/REST
  currentEmailId = normalizeId(officeItem.itemId);
  currentConvId  = normalizeId(officeItem.conversationId);

  document.getElementById('email-subject').textContent =
    officeItem.subject || t('no_subject');

  const from = officeItem.from;
  document.getElementById('email-from').innerHTML =
    from ? `<span style="color:var(--text3)">${t('email_from_label')}:</span> ${escHtml(from.displayName||'')} &lt;${escHtml(from.emailAddress||'')}&gt;` : '';

  // Gestió de categories i badges (callback-based)
  officeItem.categories.getAsync(result => {
    const cats = result.status === Office.AsyncResultStatus.Succeeded ? result.value : [];
    if (cats.length > 0) await syncCategoriesToProjects(cats);
    window._currentEmailCategories = cats;
    const isPinned = cats.some(c =>
      (c.displayName||'').toLowerCase().includes('pinned') ||
      (c.displayName||'').toLowerCase().includes('anclado')
    );

    const renderBadges = async (hasAttach) => {
      const flagStatus = officeItem.flag ? officeItem.flag.status : 'notFlagged';
      const isFlagged  = flagStatus === 'flagged';

      const badges = document.getElementById('email-badges');
      badges.innerHTML = '';
      if (isPinned)  badges.innerHTML += `<span class="badge badge-pinned">📌 Pinned</span>`;
      if (isFlagged) badges.innerHTML += `<span class="badge badge-flagged">${t('badge_flagged')}</span>`;
      if (hasAttach) badges.innerHTML += `<span class="badge badge-attach">${t('badge_attach')}</span>`;

      // Aplicar config: traduir flag/pin al valor de resp corresponent
      const cfg = getConfig();
      const flagM = cfg.flagMeaning || 'followup';
      const pinM  = cfg.pinMeaning  || 'followup';
      const meaningToResp = (m) => {
        if (m === 'pending_response') return 'me';
        if (m === 'important')        return 'me';
        if (m === 'followup')         return 'me';
        return null; // 'none' => no fer res
      };
      if (isFlagged && flagM !== 'none') selectResp(meaningToResp(flagM) || 'me');
      else if (isPinned && pinM !== 'none') selectResp(meaningToResp(pinM) || 'me');

      await updateEmailTaskState();
      renderTasks();
    };

    if (typeof officeItem.getAttachmentsAsync === 'function') {
      officeItem.getAttachmentsAsync(r2 => {
        const hasAttach = r2.status === Office.AsyncResultStatus.Succeeded && r2.value.length > 0;
        renderBadges(hasAttach);
      });
    } else {
      renderBadges(false);
    }
  });
}

// ── EMAIL ↔ TASK STATE ────────────────────────────────────────
async function updateEmailTaskState() {
  await loadData();
  const linked = findLinkedTask();
  const banner = document.getElementById('linked-task-banner');
  const qc     = document.getElementById('quick-create-section');
  const badges = document.getElementById('email-badges');

  if (linked) {
    banner.style.display = 'block';
    qc.style.display = 'none';
    document.getElementById('linked-task-name').textContent = linked.name || '—';
    if (!badges.querySelector('.badge-linked')) {
      badges.innerHTML += `<span class="badge badge-linked">${t('badge_linked')}</span>`;
    }
  } else {
    banner.style.display = 'none';
    if (currentTab === 'email') qc.style.display = 'block';
    const lb = badges.querySelector('.badge-linked');
    if (lb) lb.remove();
  }
}

function findLinkedTask() {
  if (!currentEmailId && !currentConvId) return null;
  return tasks.find(task => {
    const taskEmailId = normalizeId(task.emailId);
    const taskConvId  = normalizeId(task.conversationId);
    const matchEmail  = currentEmailId && taskEmailId && taskEmailId === currentEmailId;
    const matchConv   = currentConvId  && taskConvId  && taskConvId  === currentConvId;
    return matchEmail || matchConv;
  }) || null;
}
function editLinkedTask() {
  const linked = findLinkedTask();
  if (linked) openEditModal(linked.id);
}

let currentView = 'mine'; // 'mine' | 'followup' | 'project'

function selectView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));

function populateViewProjectSelect() {
  const sel = document.getElementById('vf-project');

  });

async function renderViews() {
  await loadData();
  const container  = document.getElementById('views-list-inner');
  const titleEl    = document.getElementById('views-title');
  const countEl    = document.getElementById('views-count');
  if (!container) return;

  // Traduir títols dels botons de vista
  document.querySelectorAll('.view-btn[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // Traduir opció "Tots els projectes"
  const vfp = document.getElementById('vf-project');
  if (vfp && vfp.options[0]) vfp.options[0].textContent = t('view_all_projects');

  const today = new Date(); today.setHours(0, 0, 0, 0);

  let list = [];
  let emptyMsg = '';
  let title = '';

  if (currentView === 'mine') {
    // Tasques on sóc jo el responsable, en qualsevol estat menys 'done'
    list = tasks.filter(task => {
      const isMe = task.resp === 'me' || task.resp === 'followup';
      return isMe && task.status !== 'done';
    });
    // Ordenar per prioritat (1=màxima → 5=mínima) i després per data creació
    list.sort((a, b) => {
      const pa = a.priority || 3, pb = b.priority || 3;
      if (pa !== pb) return pa - pb;
      return (b.created || 0) - (a.created || 0);
    });
    title    = t('view_mine_title');
    emptyMsg = t('view_mine_empty');

  } else if (currentView === 'followup') {
    // Tasques amb seguiment que ha arribat o passat el dia de fer-lo, no tancades
    list = tasks.filter(task => {
      if (task.status === 'done') return false;
      if (!task.followupDays || task.followupDays <= 0) return false;
      const fd = calcFollowupDate(task);
      return fd && fd <= today;
    });
    // Ordenar per prioritat i per data de seguiment (les més endarrerides primer)
    list.sort((a, b) => {
      const pa = a.priority || 3, pb = b.priority || 3;
      if (pa !== pb) return pa - pb;
      return (a.created || 0) - (b.created || 0); // ASC: les més antigues primer
    });
    title    = t('view_followup_title');
    emptyMsg = t('view_followup_empty');

  } else if (currentView === 'project') {
    const selProject = document.getElementById('vf-project')?.value || '';
    if (!selProject) {
      titleEl && (titleEl.textContent = t('view_project_title'));
      countEl && (countEl.textContent = '0');
      container.innerHTML = `<div class="empty-msg">${t('view_project_none')}</div>`;
      return;
    }
    list = tasks.filter(task => task.project === selProject && task.status !== 'done');
    list.sort((a, b) => {
      const pa = a.priority || 3, pb = b.priority || 3;
      if (pa !== pb) return pa - pb;
      return (b.created || 0) - (a.created || 0);
    });
    const proj = projects.find(p => p.id === selProject);
    title    = proj ? `${t('view_project_title')}: ${proj.name}` : t('view_project_title');
    emptyMsg = t('view_project_empty');
  }

  if (titleEl) titleEl.textContent = title;
  if (countEl) countEl.textContent = list.length;

  if (!list.length) {
    container.innerHTML = `<div class="empty-msg">${emptyMsg}</div>`;
    return;
  }

  container.innerHTML = '';
  list.forEach(task => {
    const el = buildTaskItem(task);
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('ti-check') || e.target.closest('.ti-check')) return;
      openEditModal(task.id);
    });
    container.appendChild(el);
  });
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.topbar-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // Elements que apareixen/desapareixen per tab
  const configArea   = document.getElementById('config-area');
  const tasksArea    = document.getElementById('tasks-area');
  const viewsArea    = document.getElementById('views-area');
  const emailCard    = document.getElementById('email-card');
  const linkedBanner = document.getElementById('linked-task-banner');
  const qc           = document.getElementById('quick-create-section');
  const filtersBar   = document.getElementById('quick-filters-bar');

  // Amagar-ho tot per defecte i activar el que toca
  if (configArea)  configArea.style.display  = 'none';
  if (viewsArea)   viewsArea.style.display   = 'none';
  if (tasksArea)   tasksArea.style.display   = 'none';
  if (filtersBar)  filtersBar.classList.remove('visible');

  if (tab === 'config') {
    if (emailCard)    emailCard.style.display    = 'none';
    if (linkedBanner) linkedBanner.style.display = 'none';
    if (qc)           qc.style.display           = 'none';
    if (configArea)   configArea.style.display   = 'flex';
    loadConfigUI();
    return;
  }

  if (tab === 'views') {
    if (emailCard)    emailCard.style.display    = 'none';
    if (linkedBanner) linkedBanner.style.display = 'none';
    if (qc)           qc.style.display           = 'none';
    if (viewsArea)    viewsArea.style.display     = 'flex';
    renderViews();
    return;
  }

  if (tab === 'all') {
    if (emailCard)    emailCard.style.display    = 'none';
    if (linkedBanner) linkedBanner.style.display = 'none';
    if (qc)           qc.style.display           = 'none';
    if (tasksArea)    tasksArea.style.display     = 'flex';
    if (filtersBar) {
      filtersBar.classList.add('visible');
      populateProjectFilter();
    }
    document.getElementById('tasks-title').textContent = t('tasks_all');
    renderTasks();
    return;
  }

  // tab === 'email'
  if (emailCard)    emailCard.style.display = '';        // visible
  if (linkedBanner) linkedBanner.style.removeProperty('display'); // updateEmailTaskState ho controla
  if (qc)           qc.style.display = findLinkedTask() ? 'none' : 'block';
  if (tasksArea)    tasksArea.style.display = 'flex';
  document.getElementById('tasks-title').textContent = t('tasks_related');
  renderTasks();
}

// ── RENDER TASKS ──────────────────────────────────────────────
async function renderTasks() {
  await loadData();
  let list = [...tasks];

  if (currentTab === 'email') {
    list = list.filter(task => {
      const taskEmailId = normalizeId(task.emailId);
      const taskConvId  = normalizeId(task.conversationId);
      const matchEmail  = currentEmailId && taskEmailId && taskEmailId === currentEmailId;
      const matchConv   = currentConvId  && taskConvId  && taskConvId  === currentConvId;
      return matchEmail || matchConv;
    });
  } else if (currentTab === 'all') {
    // Aplicar filtres ràpids
    const fPrio    = (document.getElementById('qf-priority')?.value) || '';
    const fStatus  = (document.getElementById('qf-status')?.value)   || '';
    const fResp    = (document.getElementById('qf-resp')?.value)     || '';
    const fProject = (document.getElementById('qf-project')?.value)  || '';
    if (fPrio)    list = list.filter(t2 => String(t2.priority||3) === fPrio);
    if (fStatus)  list = list.filter(t2 => t2.status === fStatus);
    if (fResp === 'me')    list = list.filter(t2 => t2.resp === 'me' || t2.resp === 'followup');
    if (fResp === 'other') list = list.filter(t2 => t2.resp === 'other' || t2.resp === 'responsible');
    if (fProject) list = list.filter(t2 => String(t2.project||'') === fProject);
  }
  list.sort((a,b) => (b.created||0) - (a.created||0));

  document.getElementById('tasks-count').textContent = list.length;
  const container = document.getElementById('task-list-inner');

  if (!list.length) {
    container.innerHTML = `<div class="empty-msg">
      ${currentTab === 'email' ? t('empty_email') : t('empty_generic')}
    </div>`;
    return;
  }

  container.innerHTML = '';
  list.forEach(task => {
    const el = buildTaskItem(task);
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('ti-check') || e.target.closest('.ti-check')) return;
      openEditModal(task.id);
    });
    container.appendChild(el);
  });
}

function buildTaskItem(task) {
  const div = document.createElement('div');
  const isCurrent = normalizeId(task.emailId) === currentEmailId;
  div.className = `task-item${task.status==='done'?' done':''}${isCurrent?' is-current-email':''}`;

  const proj   = projects.find(p => p.id === task.project);
  const stMap  = { pending:'pending', 'in-progress':'progress', done:'done-chip' };
  const stLabel= {
    pending:     t('status_pending'),
    'in-progress': t('status_progress'),
    done:        t('status_done'),
  };

  const isMe    = task.resp === 'me' || task.resp === 'followup';
  const isOther = task.resp === 'other' || task.resp === 'responsible';
  let respChip = '';
  if (isMe) {
    respChip = `<span class="ti-chip followup">👤 ${t('chip_me')}</span>`;
  } else if (isOther) {
    const who = task.assigneeName ? escHtml(task.assigneeName) : t('chip_delegated');
    respChip = `<span class="ti-chip responsible">👥 ${who}</span>`;
  }

  // followupChip ara gestionat per calcFollowupDate (see above)

  // Due date chip
  let dueChip = '';
  if (task.due) {
    const dueDate = new Date(task.due + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    const isOverdue = dueDate < now && task.status !== 'done';
    const localeMap = {en:'en-GB', es:'es-ES', ca:'ca-ES'};
    const dueStr = dueDate.toLocaleDateString(localeMap[currentLang] || 'es-ES', {day:'2-digit',month:'2-digit'});
    const dueColor = isOverdue
      ? 'color:var(--red);border-color:var(--red);background:var(--red-dim)'
      : 'color:var(--text3);border-color:var(--border2);background:var(--surface3)';
    dueChip = '<span class="ti-chip" style="' + dueColor + '">' + (isOverdue ? '⚠️' : '📅') + ' ' + dueStr + '</span>';
  }

  // Chip seguiment amb data real
  let followupChip = '';
  if (task.followupDays > 0) {
    const fd = calcFollowupDate(task);
    const today2 = new Date(); today2.setHours(0,0,0,0);
    if (fd) {
      const diff = Math.round((fd - today2) / 86400000);
      if (diff < 0)       followupChip = `<span class="ti-chip followup-overdue">${t('followup_overdue_prefix')}${Math.abs(diff)}d</span>`;
      else if (diff === 0) followupChip = `<span class="ti-chip followup-due">${t('followup_due_today')}</span>`;
      else                followupChip = `<span class="ti-chip followup">👁️ ${diff}d</span>`;
    }
  }
  // Chip recurrència
  let recurChip = '';
  if (task.recur?.enabled) {
    const desc = buildRecurDescription(task.recur);
    recurChip = `<span class="ti-chip recur" title="${escHtml(desc)}">${t('chip_recur')}</span>`;
  }
  // Chip temps total
  let timeChip = '';
  const tMins = totalTaskMins(task);
  if (tMins > 0) timeChip = `<span class="ti-chip time" title="${fmtMins(tMins)}">${t('chip_time')} ${fmtMins(tMins)}</span>`;

  div.innerHTML = `
    <span class="ti-edit-hint">✏️</span>
    <div class="ti-top">
      <div class="ti-check ${task.status==='done'?'checked':''}" onclick="toggleTask('${task.id}',event)">
        ${task.status==='done'?'✓':''}
      </div>
      <div class="ti-name">${escHtml(task.name)}</div>
    </div>
    <div class="ti-icons">
      <div class="ti-priority p${task.priority||3}">${task.priority||3}</div>
      ${proj?`<span class="ti-chip" style="color:${proj.color};border-color:${proj.color}40;background:${proj.color}18">${escHtml(proj.name)}</span>`:''}
      <span class="ti-chip ${stMap[task.status]||'pending'}">${stLabel[task.status]||t('status_pending')}</span>
      ${respChip}${followupChip}${dueChip}${recurChip}${timeChip}
      ${isCurrent?`<span class="ti-chip email">📧 ${t('chip_email')}</span>`:''}
    </div>`;
  return div;
}

async function toggleTask(id, e) {
  e.stopPropagation();
  const found = await TaskFlowDB.getTask(id);
  if (!found) return;
  const wasDone = found.status === 'done';
  found.status  = wasDone ? 'pending' : 'done';
  await saveTask(found);
  if (!wasDone && found.status === 'done' && found.recur?.enabled) {
    await spawnNextRecurrence(found);
    await loadData();
  }
  await updateEmailTaskState();
  refreshAllLists();
}

function getProjectIdFromInput(prefix) {
  const inputId = prefix + '-project-input';
  const inp = document.getElementById(inputId);
  if (!inp) return '';
  const val = inp.value.trim();
  if (!val) return '';
  const selected = prefix === 'q' ? currentProjectId : editProjectId;
  if (selected && projects.some(p => p.id === selected)) return selected;
  const existing = projects.find(p => p.name.toLowerCase() === val.toLowerCase());
  if (existing) {
    if (prefix === 'q') currentProjectId = existing.id; else editProjectId = existing.id;
    return existing.id;
  }
  const newId = 'proj_' + Date.now();
  const colors = ['#8b7eff','#00f090','#ff9d2e','#1ab8ff','#ff4f4f','#ffe033'];
  const newProj = { id: newId, name: val, color: colors[projects.length % colors.length] };
  TaskFlowDB.putProject(newProj);
  projects.push(newProj);
  if (prefix === 'q') currentProjectId = newId; else editProjectId = newId;
  return newId;
}
function setProjectInput(prefix, projectId) {
  const proj = projects.find(p => p.id === projectId);
  const inp = document.getElementById(prefix + '-project-input');
  if (inp) inp.value = proj ? proj.name : '';
  if (prefix === 'q') currentProjectId = projectId || '';
  else editProjectId = projectId || '';
}

// ── CREATE TASK ───────────────────────────────────────────────
async function createTaskFromEmail() {
  if (!officeItem) return;
  const btn = document.getElementById('btn-create');
  btn.disabled = true;

  const already = await TaskFlowDB.taskExistsForEmail(currentEmailId);
  if (already) {
    showFlash(t('flash_exists'));
    btn.disabled = false;
    return;
  }

  const personName = currentResp === 'other'
    ? (document.getElementById('q-person-name').value || '').trim()
    : '';
  if (currentResp === 'other' && personName) savePerson(personName);

  // Llegir badges actuals per aplicar config
  const cfg = getConfig();
  const flagM = cfg.flagMeaning || 'followup';
  const pinM  = cfg.pinMeaning  || 'followup';
  const badges = document.getElementById('email-badges');
  const isFlaggedNow = badges ? badges.innerHTML.includes('badge-flagged') : false;
  const isPinnedNow  = badges ? badges.innerHTML.includes('Pinned') : false;

  // Determinar resp final tenint en compte config de flag/pin
  let finalResp = currentResp;
  const meaningToResp = (m) => (m === 'none') ? null : 'me';
  if (isFlaggedNow && flagM !== 'none') {
    finalResp = meaningToResp(flagM) || finalResp;
  } else if (isPinnedNow && pinM !== 'none') {
    finalResp = meaningToResp(pinM) || finalResp;
  }

  // Seguiment: aplicar config per defecte
  const followupDaysVal = cfg.defaultFollowup !== undefined
    ? cfg.defaultFollowup
    : (parseInt(document.getElementById('followup-days-input').value) || 0);

  const task = {
    id: 'task_' + Date.now(),
    name: officeItem.subject || t('no_subject'),
    desc: `${t('email_from_prefix')}: ${officeItem.from ? officeItem.from.displayName : ''}`,
    emailId: currentEmailId,  // ja normalitzat per bindEmailContext
    emailSubject: officeItem.subject,
    emailFrom: officeItem.from ? officeItem.from.emailAddress : '',
    conversationId: currentConvId,
    resp: finalResp,
    assigneeName: personName,
    priority: parseInt(document.getElementById('q-priority').value) || 3,
    status: 'pending',
    project: getProjectIdFromInput('q') || getProjectIdFromCategories(window._currentEmailCategories||[]),
    category: 'Email',
    due: '',
    followupDays: followupDaysVal,
    vendor: '',
    created: Date.now(),
    lastActivity: new Date().toISOString(),
    source: 'outlook-addin'
  };

  await saveTask(task);
  showFlash(t('flash_created'));
  await updateEmailTaskState();
  renderTasks();
  btn.disabled = false;
}

function showFlash(msg) {
  const f = document.getElementById('success-flash');
  f.textContent = msg;
  f.style.display = 'block';
  setTimeout(() => f.style.display = 'none', 3000);
}

function fmtMins(m) {
  if (!m || m <= 0) return '0 ' + t('time_min');
  if (m < 60) return m + ' ' + t('time_min');
  const h = Math.floor(m / 60), r = m % 60;
  return r > 0 ? `${h}${t('time_h')} ${r}${t('time_min')}` : `${h}${t('time_h')}`;
}
function totalTaskMins(task) {
  return (task.timeLog || []).reduce((s, e) => s + (e.mins || 0), 0);
}
function renderTimeSection(task) {
  const list  = document.getElementById('time-log-list');
  const badge = document.getElementById('time-total-badge');
  if (!list) return;
  const log   = task.timeLog || [];
  const total = totalTaskMins(task);
  if (badge) { badge.textContent = fmtMins(total); badge.style.display = total > 0 ? '' : 'none'; }
  if (!log.length) {
    list.innerHTML = `<div class="time-empty">${t('time_empty')}</div>`; return;
  }
  const lmap = {en:'en-GB', es:'es-ES', ca:'ca-ES'};
  list.innerHTML = '';
  [...log].reverse().forEach((entry, ri) => {
    const realIdx = log.length - 1 - ri;
    const d = new Date(entry.date);
    const ds = d.toLocaleDateString(lmap[currentLang]||'es-ES', {day:'2-digit',month:'2-digit'});
    const row = document.createElement('div');
    row.className = 'time-log-item';
    row.innerHTML = `<span class="time-log-date">${ds}</span><span class="time-log-mins">${fmtMins(entry.mins)}</span><span class="time-log-note">${escHtml(entry.note||'')}</span><button class="time-log-del" onclick="deleteTimeEntry(${realIdx})">✕</button>`;
    list.appendChild(row);
  });
}
async function addTimeEntry() {
  if (!editingTaskId) return;
  const mins = parseInt(document.getElementById('time-mins').value) || 0;
  if (mins <= 0) return;
  const task = await TaskFlowDB.getTask(editingTaskId);
  if (!task) return;
  if (!task.timeLog) task.timeLog = [];
  task.timeLog.push({ date: new Date().toISOString(), mins, note: (document.getElementById('time-note').value||'').trim() });
  task.lastActivity = new Date().toISOString();
  await saveTask(task);
  document.getElementById('time-mins').value = '';
  document.getElementById('time-note').value = '';
  renderTimeSection(task);
  refreshAllLists();
}
async function deleteTimeEntry(idx) {
  if (!editingTaskId) return;
  const task = await TaskFlowDB.getTask(editingTaskId);
  if (!task || !task.timeLog) return;
  task.timeLog.splice(idx, 1);
  await saveTask(task);
  renderTimeSection(task);
  refreshAllLists();
}

function calcFollowupDate(task) {
  if (!task.followupDays || task.followupDays <= 0) return null;
  const base = new Date(task.created || Date.now());
  base.setHours(0,0,0,0);
  base.setDate(base.getDate() + task.followupDays);
  return base;
}
function renderFollowupDate(task) {
  const el = document.getElementById('followup-date-display');
  if (!el) return;
  const d = calcFollowupDate(task);
  if (!d) { el.textContent = t('followup_no_date'); el.style.opacity = '.4'; return; }
  el.style.opacity = '1';
  const lmap = {en:'en-GB', es:'es-ES', ca:'ca-ES'};
  el.textContent = d.toLocaleDateString(lmap[currentLang]||'es-ES', {day:'2-digit',month:'2-digit',year:'numeric'});
}
// Crida en canviar el nombre de dies de seguiment
function onFollowupDaysChange() {
  editFollowupDays = parseInt(document.getElementById('edit-followup-days-input').value) || 0;
  // Recalcular la data de seguiment basant-nos en la tasca en edició
  TaskFlowDB.getTask(editingTaskId).then(task => {
    if (!task) return;
    // Calcular directament a partir dels dies del formulari
    const fd = editFollowupDays > 0
      ? (() => {
          const b = new Date(task.created || Date.now());
          b.setHours(0,0,0,0);
          b.setDate(b.getDate() + editFollowupDays);
          return b;
        })()
      : null;
    const el = document.getElementById('followup-date-display');
    if (!el) return;
    if (!fd) { el.textContent = t('followup_no_date'); el.style.opacity='.4'; return; }
    el.style.opacity='1';
    const lmap={en:'en-GB',es:'es-ES',ca:'ca-ES'};
    el.textContent = fd.toLocaleDateString(lmap[currentLang]||'es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  });
}

function renderRelatedSection(task) {
  const list = document.getElementById('related-list');
  if (!list) return;
  const ids = task.relatedIds || [];
  if (!ids.length) { list.innerHTML = `<div style="font-size:11px;color:var(--text3);padding:4px 0;font-style:italic">${t('related_empty')}</div>`; return; }
  list.innerHTML = '';
  ids.forEach(rid => {

    const row = document.createElement('div');

    row.innerHTML = `<div class="ti-priority p${rel.priority||3} related-item-prio">${rel.priority||3}</div><span class="related-item-name">${escHtml(rel.name)}</span><button class="related-del" onclick="unlinkRelated('${escHtml(rid)}',event)">✕</button>`;

      if (e.target.classList.contains('related-del')) return;
      closeEditModal(); setTimeout(() => openEditModal(rid), 80);
    });
