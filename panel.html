}
function onRelatedSearch(val) {
  const dd = document.getElementById('related-dropdown');
  if (!val.trim()) { dd.classList.remove('open'); return; }
  const task = tasks.find(t2 => t2.id === editingTaskId);
  const existing = task?.relatedIds || [];
  const matches = tasks.filter(t2 => t2.id !== editingTaskId && !existing.includes(t2.id) && t2.name.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  dd.innerHTML = '';
  matches.forEach(t2 => {
    const opt = document.createElement('div');
    opt.className = 'related-opt';
    opt.innerHTML = `<span class="ti-priority p${t2.priority||3}" style="display:inline-flex;width:16px;height:16px;border-radius:3px;border:1.5px solid;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-right:5px">${t2.priority||3}</span>${escHtml(t2.name)}`;
    opt.onmousedown = () => linkRelated(t2.id);
    dd.appendChild(opt);
  });
  const newOpt = document.createElement('div');
  newOpt.className = 'related-opt related-opt-new';
  newOpt.textContent = t('related_new_prefix') + '"' + val + '"';
  newOpt.onmousedown = () => createAndLinkRelated(val);
  dd.appendChild(newOpt);
  dd.classList.add('open');
}
function hideRelatedDropdown() {
  setTimeout(() => { const dd = document.getElementById('related-dropdown'); if (dd) dd.classList.remove('open'); }, 150);
}
async function linkRelated(relId) {
  if (!editingTaskId) return;
  const task = await TaskFlowDB.getTask(editingTaskId);
  if (!task) return;
  if (!task.relatedIds) task.relatedIds = [];
  if (!task.relatedIds.includes(relId)) {
    task.relatedIds.push(relId);
    const rel = await TaskFlowDB.getTask(relId);
    if (rel) {
      if (!rel.relatedIds) rel.relatedIds = [];
      if (!rel.relatedIds.includes(editingTaskId)) { rel.relatedIds.push(editingTaskId); await TaskFlowDB.putTask(rel); }
    }
    await saveTask(task);
    await loadData();
  }
  document.getElementById('related-search').value = '';
  document.getElementById('related-dropdown').classList.remove('open');
  renderRelatedSection(task);
}
async function createAndLinkRelated(name) {
  const newTask = { id:'task_'+Date.now(), name:name.trim()||'Nova tasca', desc:'', emailId:'', emailSubject:'', emailFrom:'', conversationId:'', resp:'me', assigneeName:'', priority:3, status:'pending', project:'', category:'Task', due:'', followupDays:0, vendor:'', created:Date.now(), lastActivity:new Date().toISOString(), source:'related-create' };
  await TaskFlowDB.putTask(newTask);
  tasks = await TaskFlowDB.getAllTasks();
  await linkRelated(newTask.id);
}
async function unlinkRelated(relId, e) {
  if (e) e.stopPropagation();
  if (!editingTaskId) return;
  const task = await TaskFlowDB.getTask(editingTaskId);
  if (!task) return;
  task.relatedIds = (task.relatedIds||[]).filter(id => id !== relId);
  const rel = await TaskFlowDB.getTask(relId);
  if (rel) { rel.relatedIds = (rel.relatedIds||[]).filter(id => id !== editingTaskId); await TaskFlowDB.putTask(rel); }
  await saveTask(task);
  await loadData();
  renderRelatedSection(task);
}

// ══════════════════════════════════════════════════════════════
// TASKFLOW — ACTIVITAT PERIÒDICA (recurrència avançada)
// task.recur = { enabled, type, daily:{num}, weekly:{num,days[]},
//                monthly:{num,mode,dom,nth:{ord,wd}}, yearly:{num} }
// ══════════════════════════════════════════════════════════════

let _recurType = 'daily'; // 'daily'|'weekly'|'monthly'|'yearly'

function setRecurType(type) {
  _recurType = type;
  // Botons actius
  ['daily','weekly','monthly','yearly'].forEach(tp => {
    const btn = document.getElementById('rtype-' + tp);
    if (btn) btn.classList.toggle('active', tp === type);
    const sub = document.getElementById('rsub-' + tp);
    if (sub) sub.classList.toggle('visible', tp === type);
  });
  // Inicialitzar sub-configs especials
  if (type === 'weekly')  buildWeekdayChips();
  if (type === 'monthly') { buildMonthlyNthWd(); onMonthlyModeChange(); }
  updateRecurSummary();
}

function onRecurToggle() {
  const on = document.getElementById('recur-toggle').checked;
  const cfg = document.getElementById('recur-config');
  if (cfg) cfg.classList.toggle('visible', on);
  if (on) { setRecurType(_recurType); updateRecurSummary(); }
}

function buildWeekdayChips() {
  const wrap = document.getElementById('recur-weekday-chips');
  if (!wrap) return;
  const days = t('weekdays_short');
  // Preservar selecció existent
  const selected = wrap._selected || [];
  wrap.innerHTML = '';
  wrap._selected = selected;
  days.forEach((label, i) => {
    const chip = document.createElement('div');
    chip.className = 'recur-wd' + (selected.includes(i) ? ' active' : '');
    chip.textContent = label;
    chip.dataset.day = i;
    chip.onclick = () => {
      chip.classList.toggle('active');
      if (chip.classList.contains('active')) {
        if (!wrap._selected.includes(i)) wrap._selected.push(i);
      } else {
        wrap._selected = wrap._selected.filter(d => d !== i);
      }
      updateRecurSummary();
    };
    wrap.appendChild(chip);
  });
}

function buildMonthlyNthWd() {
  const sel = document.getElementById('recur-monthly-nth-wd');
  if (!sel || sel.options.length > 0) return;
  const days = t('weekdays_long');
  days.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function onMonthlyModeChange() {
  const mode = document.getElementById('recur-monthly-mode')?.value || 'dom';
  const domSub = document.getElementById('rsub-monthly-dom');
  const nthSub = document.getElementById('rsub-monthly-nth');
  if (domSub) domSub.classList.toggle('visible', mode === 'dom');
  if (nthSub) nthSub.classList.toggle('visible', mode === 'nth');
  updateRecurSummary();
}

function updateRecurSummary() {
  const el = document.getElementById('recur-summary');
  if (!el) return;
  el.textContent = buildRecurDescription(getRecurFromForm());
}

function buildRecurDescription(recur) {
  if (!recur || !recur.enabled) return '';
  const days   = t('weekdays_long');
  const months = t('months_long');
  const ords   = [t('recur_ord_1'), t('recur_ord_2'), t('recur_ord_3'), t('recur_ord_4'), t('recur_ord_last')];
  const ordMap = {'1':ords[0],'2':ords[1],'3':ords[2],'4':ords[3],'-1':ords[4]};

  if (recur.type === 'daily') {
    const n = recur.daily?.num || 1;
    return n === 1 ? `${t('recur_every')} dia` : `${t('recur_every')} ${n} ${t('recur_days')}`;
  }
  if (recur.type === 'weekly') {
    const n    = recur.weekly?.num || 1;
    const wds  = (recur.weekly?.days || []).map(i => days[i]).join(', ');
    const base = n === 1 ? `${t('recur_every')} setmana` : `${t('recur_every')} ${n} ${t('recur_weeks')}`;
    return wds ? `${base} — ${wds}` : base;
  }
  if (recur.type === 'monthly') {
    const n    = recur.monthly?.num || 1;
    const base = n === 1 ? `${t('recur_every')} mes` : `${t('recur_every')} ${n} ${t('recur_months')}`;
    const mode = recur.monthly?.mode || 'dom';
    if (mode === 'dom') {
      const dom = recur.monthly?.dom || 1;
      return `${base}, dia ${dom}`;
    } else {
      const ord = ordMap[String(recur.monthly?.nth?.ord || 1)] || ords[0];
      const wd  = days[recur.monthly?.nth?.wd || 0];
      return `${base}, ${ord} ${wd}`;
    }
  }
  if (recur.type === 'yearly') {
    const n = recur.yearly?.num || 1;
    return n === 1 ? `${t('recur_every')} any` : `${t('recur_every')} ${n} ${t('recur_years')}`;
  }
  return '';
}

function getRecurFromForm() {
  const enabled = document.getElementById('recur-toggle')?.checked || false;
  if (!enabled) return { enabled: false };
  const type = _recurType;
  const recur = { enabled: true, type };

  if (type === 'daily') {
    recur.daily = { num: parseInt(document.getElementById('recur-daily-num')?.value) || 1 };
  }
  if (type === 'weekly') {
    const wrap = document.getElementById('recur-weekday-chips');
    recur.weekly = {
      num:  parseInt(document.getElementById('recur-weekly-num')?.value) || 1,
      days: wrap?._selected ? [...wrap._selected].sort() : []
    };
  }
  if (type === 'monthly') {
    const mode = document.getElementById('recur-monthly-mode')?.value || 'dom';
    recur.monthly = { num: parseInt(document.getElementById('recur-monthly-num')?.value) || 1, mode };
    if (mode === 'dom') {
      recur.monthly.dom = parseInt(document.getElementById('recur-monthly-dom-num')?.value) || 1;
    } else {
      recur.monthly.nth = {
        ord: parseInt(document.getElementById('recur-monthly-nth-ord')?.value) || 1,
        wd:  parseInt(document.getElementById('recur-monthly-nth-wd')?.value)  || 0
      };
    }
  }
  if (type === 'yearly') {
    recur.yearly = { num: parseInt(document.getElementById('recur-yearly-num')?.value) || 1 };
  }
  return recur;
}

function renderRecurSection(task) {
  const tog  = document.getElementById('recur-toggle');
  const cfg  = document.getElementById('recur-config');
  const recur = task.recur || {};
  const type  = recur.type || 'daily';

  // Traduir botons i opcions amb data-i18n
  document.querySelectorAll('#recur-config [data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });

  if (tog) tog.checked = !!recur.enabled;
  if (cfg) cfg.classList.toggle('visible', !!recur.enabled);
  _recurType = type;

  // Activar el tipus correcte (sense cridar setRecurType que fa side effects)
  ['daily','weekly','monthly','yearly'].forEach(tp => {
    const btn = document.getElementById('rtype-' + tp);
    if (btn) btn.classList.toggle('active', tp === type);
    const sub = document.getElementById('rsub-' + tp);
    if (sub) sub.classList.toggle('visible', tp === type);
  });

  // Omplir valors
  if (type === 'daily'   && recur.daily)   {
    const n = document.getElementById('recur-daily-num');
    if (n) n.value = recur.daily.num || 1;
  }
  if (type === 'weekly'  && recur.weekly) {
    const n = document.getElementById('recur-weekly-num');
    if (n) n.value = recur.weekly.num || 1;
    const wrap = document.getElementById('recur-weekday-chips');
    if (wrap) { wrap._selected = [...(recur.weekly.days||[])]; buildWeekdayChips(); }
  }
  if (type === 'monthly' && recur.monthly) {
    const n = document.getElementById('recur-monthly-num');
    if (n) n.value = recur.monthly.num || 1;
    buildMonthlyNthWd();
    const mode = recur.monthly.mode || 'dom';
    const mSel = document.getElementById('recur-monthly-mode');
    if (mSel) mSel.value = mode;
    if (mode === 'dom') {
      const dn = document.getElementById('recur-monthly-dom-num');
      if (dn) dn.value = recur.monthly.dom || 1;
    } else if (recur.monthly.nth) {
      const ord = document.getElementById('recur-monthly-nth-ord');
      const wd  = document.getElementById('recur-monthly-nth-wd');
      if (ord) ord.value = recur.monthly.nth.ord || 1;
      if (wd)  wd.value  = recur.monthly.nth.wd  || 0;
    }
    onMonthlyModeChange();
  }
  if (type === 'yearly'  && recur.yearly) {
    const n = document.getElementById('recur-yearly-num');
    if (n) n.value = recur.yearly.num || 1;
  }
  updateRecurSummary();
}

// ── Calcular la data de la propera repetició ──────────────────
function calcNextRecurDate(recur, fromDate) {
  const base = new Date(fromDate || Date.now());
  base.setHours(0,0,0,0);

  if (recur.type === 'daily') {
    const d = new Date(base);
    d.setDate(d.getDate() + (recur.daily?.num || 1));
    return d;
  }
  if (recur.type === 'weekly') {
    const targetDays = recur.weekly?.days || [];
    const num = recur.weekly?.num || 1;
    // Propera ocurrència: avançar setmanes senceres primer, després trobar el dia
    if (targetDays.length > 0) {
      // Buscar el primer dia de la setmana >= demà
      const next = new Date(base);
      for (let i = 1; i <= 7 * num; i++) {
        next.setDate(base.getDate() + i);
        const wd = (next.getDay() + 6) % 7; // 0=Dl...6=Dg
        if (targetDays.includes(wd)) return next;
      }
    }
    const d = new Date(base);
    d.setDate(d.getDate() + num * 7);
    return d;
  }
  if (recur.type === 'monthly') {
    const num  = recur.monthly?.num || 1;
    const mode = recur.monthly?.mode || 'dom';
    const d    = new Date(base);
    d.setMonth(d.getMonth() + num);
    if (mode === 'dom') {
      d.setDate(recur.monthly.dom || 1);
    } else if (recur.monthly?.nth) {
      const { ord, wd } = recur.monthly.nth;
      d.setDate(1);
      let count = 0;
      if (ord === -1) {
        // Últim: buscar des del final del mes
        d.setMonth(d.getMonth() + 1, 0); // últim dia del mes
        while ((d.getDay() + 6) % 7 !== wd) d.setDate(d.getDate() - 1);
      } else {
        while (count < ord) {
          if ((d.getDay() + 6) % 7 === wd) count++;
          if (count < ord) d.setDate(d.getDate() + 1);
        }
      }
    }
    return d;
  }
  if (recur.type === 'yearly') {
    const d = new Date(base);
    d.setFullYear(d.getFullYear() + (recur.yearly?.num || 1));
    return d;
  }
  return null;
}

async function spawnNextRecurrence(completedTask) {
  if (!completedTask.recur?.enabled) return;
  const nextDate  = calcNextRecurDate(completedTask.recur, Date.now());
  if (!nextDate) return;
  const today     = new Date(); today.setHours(0,0,0,0);
  const followupDays = Math.round((nextDate - today) / 86400000);
  const groupId   = completedTask.recurGroupId || completedTask.id;

  const newTask = {
    ...JSON.parse(JSON.stringify(completedTask)),
    id:           'task_' + Date.now(),
    status:       'pending',
    created:      Date.now(),
    lastActivity: new Date().toISOString(),
    timeLog:      [],
    relatedIds:   [],
    followupDays: Math.max(0, followupDays),
    source:       'recurrence',
    recurGroupId: groupId,
    emailId:      '',
    conversationId: '',
  };

  await TaskFlowDB.putTask(newTask);
  tasks = await TaskFlowDB.getAllTasks();
}

// TASKFLOW — CATEGORIES OUTLOOK → PROJECTES
// ══════════════════════════════════════════════════════════════
async function syncCategoriesToProjects(categories) {
  for (const cat of categories) {
    const name = (cat.displayName||'').trim();
    if (!name) continue;
    if (!projects.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      const colors = ['#8b7eff','#00f090','#ff9d2e','#1ab8ff','#ff4f4f','#ffe033','#b0a6ff'];
      const np = { id:'proj_cat_'+name.replace(/\s+/g,'_').toLowerCase()+'_'+Date.now(), name, color:colors[projects.length%colors.length], fromOutlookCategory:true };
      await TaskFlowDB.putProject(np);
      projects.push(np);
    }
  }
}
function getProjectIdFromCategories(cats) {
  for (const cat of cats) {
    const name = (cat.displayName||'').trim();
    const proj = projects.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (proj) return proj.id;
  }
  return '';
}

// ══════════════════════════════════════════════════════════════
// Helper: refrescar llistes actives
// ══════════════════════════════════════════════════════════════
function refreshAllLists() {
  if (currentTab === 'views') renderViews();
  else renderTasks();
}

// ── EDIT MODAL ────────────────────────────────────────────────
async function openEditModal(taskId) {
  const task = await TaskFlowDB.getTask(taskId);
  if (!task) return;
  editingTaskId = taskId;

  document.getElementById('edit-name').value    = task.name || '';
  document.getElementById('edit-name').placeholder = t('task_placeholder');
  document.getElementById('edit-desc').value    = task.desc || '';
  document.getElementById('edit-desc').placeholder = t('desc_placeholder');

  // Rebuild dynamic selects with current language
  buildPriorityOptions('edit-priority', task.priority || 3);
  buildStatusOptions('edit-status', task.status || 'pending');
  setProjectInput('edit', task.project || '');

  // Seguiment
  editFollowupDays = task.followupDays !== undefined ? task.followupDays : 2;
  document.getElementById('edit-followup-days-input').value = editFollowupDays;

  // Responsable — backward compat
  let respVal = task.resp || 'me';
  if (respVal === 'followup' || respVal === 'none') respVal = 'me';
  if (respVal === 'responsible') respVal = 'other';
  selectEditResp(respVal);
  document.getElementById('edit-person-name').value = task.assigneeName || '';
  document.getElementById('edit-person-name').placeholder = t('person_placeholder');

  // Due date
  document.getElementById('edit-due').value = task.due || '';

  // Category
  const catSel = document.getElementById('edit-category');
  catSel.value = task.category || 'Email';

  // Proveïdor
  const vendorInp = document.getElementById('edit-vendor');
  if (vendorInp) {
    vendorInp.value = task.vendor || '';
    vendorInp.placeholder = t('vendor_placeholder');
  }

  // Banner email origen
  const originBanner = document.getElementById('edit-email-origin');
  const originSubject = document.getElementById('edit-email-origin-subject');
  if (task.emailSubject || task.emailFrom) {
    originSubject.textContent = task.emailSubject || task.emailFrom || '';
    originBanner.classList.add('visible');
  } else {
    originBanner.classList.remove('visible');
  }

  // Seguiment: data calculada
  renderFollowupDate(task);
  // Time tracking
  renderTimeSection(task);
  // Tasques relacionades
  await loadData();
  renderRelatedSection(task);
  // Activitat periòdica
  renderRecurSection(task);
  // Traduir placeholders
  document.querySelectorAll('#edit-modal [data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.querySelectorAll('#edit-modal [data-i18n]').forEach(el => {
    // No sobreescriure elements que ja tinguin fills (botons etc.)
    if (!el.children.length) el.textContent = t(el.getAttribute('data-i18n'));
  });

  document.getElementById('edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('edit-name').focus(), 120);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingTaskId = null;
}
function onModalOverlayClick(e) {
  if (e.target === document.getElementById('edit-modal')) closeEditModal();
}

function selectEditResp(r) {
  editResp = r;
  document.getElementById('edit-resp-me').className    = 'resp-chip' + (r==='me'?' active-me':'');
  document.getElementById('edit-resp-other').className = 'resp-chip' + (r==='other'?' active-other':'');
  document.getElementById('edit-resp-person-wrap').style.display = r === 'other' ? 'block' : 'none';
}

function onEditPersonInput(val) {
  const dd = document.getElementById('edit-person-dropdown');
  const persons = getPersons().filter(p => p.toLowerCase().includes(val.toLowerCase()));
  if (!val.trim() || !persons.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = persons.map(p =>
    `<div class="person-option" onmousedown="selectEditPerson('${escHtml(p)}')">${escHtml(p)}</div>`
  ).join('');
  dd.style.display = 'block';
}
function selectEditPerson(name) {
  document.getElementById('edit-person-name').value = name;
  document.getElementById('edit-person-dropdown').style.display = 'none';
}
function hideEditPersonDropdown() {
  setTimeout(() => { document.getElementById('edit-person-dropdown').style.display = 'none'; }, 150);
}

async function saveEditedTask() {
  if (!editingTaskId) return;
  const task = await TaskFlowDB.getTask(editingTaskId);
  if (!task) return;

  const personName = editResp === 'other'
    ? (document.getElementById('edit-person-name').value || '').trim()
    : '';
  if (editResp === 'other' && personName) savePerson(personName);

  task.name         = document.getElementById('edit-name').value.trim() || task.name;
  task.desc         = document.getElementById('edit-desc').value;
  task.priority     = parseInt(document.getElementById('edit-priority').value) || 3;
  task.status       = document.getElementById('edit-status').value;
  task.project      = getProjectIdFromInput('edit');
  task.resp         = editResp;
  task.assigneeName = personName;
  task.followupDays = parseInt(document.getElementById('edit-followup-days-input').value) || 0;
  task.due          = document.getElementById('edit-due').value || '';
  task.category     = document.getElementById('edit-category').value || 'Email';
  task.vendor       = (document.getElementById('edit-vendor')?.value || '').trim();
  task.lastActivity = new Date().toISOString();
  // Recurrència
  const newRecur   = getRecurFromForm();
  const nowDone    = task.status === 'done';
  task.recur       = newRecur;
  if (!task.recurGroupId && newRecur.enabled) task.recurGroupId = task.id;

  await saveTask(task);

  // Si es marca com a Feta i és recurrent, generar propera repetició
  if (nowDone && newRecur.enabled) {
    await spawnNextRecurrence(task);
    await loadData();
  }

  closeEditModal();
  await updateEmailTaskState();
  refreshAllLists();
}

async function deleteCurrentTask() {
  if (!editingTaskId) return;
  if (!confirm(t('confirm_delete'))) return;
  await TaskFlowDB.deleteTask(editingTaskId);
  tasks = await TaskFlowDB.getAllTasks();
  syncToRoaming();
  closeEditModal();
  await updateEmailTaskState();
  renderTasks();
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
